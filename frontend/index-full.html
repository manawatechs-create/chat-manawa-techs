<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANAWA TECHS v2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="manifest" href="/manifest.json">
    <style>
        :root {
            --primary: #6C5CE7;
            --secondary: #00CEC9;
            --accent: #FD79A8;
            --success: #00B894;
            --warning: #FDCB6E;
            --danger: #E17055;
            --dark: #2D3436;
            --darker: #1E272E;
            --gray-100: #F8F9FA;
            --gray-200: #E9ECEF;
            --gray-600: #6C757D;
            --border-radius: 16px;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: var(--darker);
            color: white;
            padding: 20px;
            overflow-y: auto;
            z-index: 1000;
        }

        .sidebar h2 { font-size: 20px; margin-bottom: 30px; color: var(--primary); }
        
        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 4px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .sidebar a:hover, .sidebar a.active {
            background: rgba(108,92,231,0.2);
            color: white;
        }

        .sidebar a i { font-size: 20px; width: 24px; }

        .main {
            margin-left: 260px;
            padding: 30px;
        }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: white;
            border-radius: var(--border-radius);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            border: none;
        }

        .card h3 { margin-bottom: 16px; font-size: 18px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
        }

        .stat-card .value { font-size: 28px; font-weight: 700; }
        .stat-card .label { color: var(--gray-600); font-size: 13px; }

        .btn {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: white; border: 2px solid var(--gray-200); }

        .form-control, .form-select {
            width: 100%;
            padding: 10px 16px;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-primary { background: rgba(108,92,231,0.1); color: var(--primary); }
        .badge-success { background: rgba(0,184,148,0.1); color: var(--success); }
        .badge-warning { background: rgba(253,203,110,0.1); color: #e17055; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main { margin-left: 0; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <h2>⚡ MANAWA TECHS v2</h2>
        <a onclick="showPage('dashboard')" class="active"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a onclick="showPage('posts')"><i class="bi bi-pencil-square"></i> Posts & Images</a>
        <a onclick="showPage('clients')"><i class="bi bi-people"></i> Clients</a>
        <a onclick="showPage('crm')"><i class="bi bi-diagram-3"></i> CRM Pipeline</a>
        <a onclick="showPage('billing')"><i class="bi bi-cash-stack"></i> Devis & Factures</a>
        <a onclick="showPage('automation')"><i class="bi bi-robot"></i> Automatisation</a>
        <a onclick="showPage('analytics')"><i class="bi bi-graph-up"></i> Analytics</a>
        <a onclick="showPage('templates')"><i class="bi bi-layers"></i> Templates</a>
    </div>

    <!-- Main Content -->
    <div class="main">
        
        <!-- DASHBOARD -->
        <div id="page-dashboard" class="page active">
            <h1>📊 Tableau de bord</h1>
            <div class="stats-grid" id="dash-stats">
                <div class="stat-card"><div class="value" id="stat-posts">-</div><div class="label">Posts</div></div>
                <div class="stat-card"><div class="value" id="stat-clients">-</div><div class="label">Clients</div></div>
                <div class="stat-card"><div class="value" id="stat-messages">-</div><div class="label">Messages</div></div>
                <div class="stat-card"><div class="value" id="stat-revenue">-</div><div class="label">Revenus (FCFA)</div></div>
            </div>
        </div>

        <!-- POSTS -->
        <div id="page-posts" class="page">
            <div class="card">
                <h3>✍️ Générer un post</h3>
                <select class="form-select" id="post-domaine">
                    <option value="odoo">Odoo ERP</option>
                    <option value="web">Dev Web</option>
                    <option value="ia">IA</option>
                    <option value="formation">Formation</option>
                </select>
                <button class="btn btn-primary" onclick="generatePost()"><i class="bi bi-stars"></i> Générer</button>
                <div id="post-result" style="margin-top:16px;"></div>
            </div>
        </div>

        <!-- CLIENTS -->
        <div id="page-clients" class="page">
            <div class="card">
                <h3>👥 Clients</h3>
                <button class="btn btn-primary" onclick="loadClients()">Charger</button>
                <div id="clients-list" style="margin-top:16px;"></div>
            </div>
        </div>

        <!-- CRM -->
        <div id="page-crm" class="page">
            <div class="card">
                <h3>📊 Pipeline de vente</h3>
                <button class="btn btn-primary" onclick="loadPipeline()">Charger le pipeline</button>
                <div id="pipeline-view" style="margin-top:16px;"></div>
            </div>
        </div>

        <!-- BILLING -->
        <div id="page-billing" class="page">
            <div class="card">
                <h3>💰 Devis & Factures</h3>
                <button class="btn btn-primary" onclick="loadBilling()">Charger</button>
                <div id="billing-view" style="margin-top:16px;"></div>
            </div>
        </div>

        <!-- AUTOMATION -->
        <div id="page-automation" class="page">
            <div class="card">
                <h3>🤖 Automatisation</h3>
                <button class="btn btn-primary" onclick="loadAutomationStatus()">Statut</button>
                <div id="automation-view" style="margin-top:16px;"></div>
            </div>
        </div>

        <!-- ANALYTICS -->
        <div id="page-analytics" class="page">
            <div class="card">
                <h3>📈 Analytics</h3>
                <button class="btn btn-primary" onclick="loadAnalytics()">Charger les stats</button>
                <button class="btn btn-outline" onclick="exportPDF()">📄 Export PDF</button>
                <div id="analytics-view" style="margin-top:16px;"></div>
            </div>
        </div>

        <!-- TEMPLATES -->
        <div id="page-templates" class="page">
            <div class="card">
                <h3>📝 Templates</h3>
                <button class="btn btn-primary" onclick="loadTemplates()">Charger</button>
                <div id="templates-view" style="margin-top:16px;"></div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';
        
        // Navigation
        function showPage(name) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById('page-' + name).classList.add('active');
            event.target.classList.add('active');
            
            // Charger les données
            if (name === 'dashboard') loadDashboard();
            if (name === 'crm') loadPipeline();
            if (name === 'analytics') loadAnalytics();
            if (name === 'billing') loadBilling();
            if (name === 'templates') loadTemplates();
            if (name === 'automation') loadAutomationStatus();
        }

        // Dashboard
        async function loadDashboard() {
            try {
                const [dashRes, billingRes] = await Promise.all([
                    fetch(API + '/dashboard'),
                    fetch(API + '/billing/dashboard')
                ]);
                
                const dash = await dashRes.json();
                const billing = await billingRes.json();
                
                if (dash.status === 'success') {
                    document.getElementById('stat-posts').textContent = dash.data.total_posts || 0;
                    document.getElementById('stat-clients').textContent = dash.data.total_clients || 0;
                    document.getElementById('stat-messages').textContent = dash.data.total_messages || 0;
                    document.getElementById('stat-revenue').textContent = (billing.data?.total_revenue || 0) + ' FCFA';
                }
            } catch (error) {
                console.error('Erreur dashboard:', error);
            }
        }

        // Posts
        async function generatePost() {
            const domaine = document.getElementById('post-domaine').value;
            const resultDiv = document.getElementById('post-result');
            resultDiv.innerHTML = '⏳ Génération...';
            
            try {
                const res = await fetch(API + '/posts/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domaine, type: 'expertise' })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    resultDiv.innerHTML = `<div style="background:#f8f9fa;padding:16px;border-radius:10px;margin-top:8px;">${data.data.contenu}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = '❌ Erreur';
            }
        }

        // CRM Pipeline
        async function loadPipeline() {
            const view = document.getElementById('pipeline-view');
            view.innerHTML = '⏳ Chargement...';
            
            try {
                const res = await fetch(API + '/crm/pipeline');
                const data = await res.json();
                
                if (data.status === 'success') {
                    view.innerHTML = data.data.map(stage => `
                        <div class="card" style="border-left:4px solid ${stage.color || '#6C5CE7'};">
                            <h4>${stage.name} (${stage.clients?.length || 0})</h4>
                            ${stage.clients?.map(c => `
                                <div style="padding:8px;margin:4px 0;background:#f8f9fa;border-radius:8px;">
                                    <strong>${c.first_name || ''} ${c.last_name || ''}</strong>
                                    ${c.company ? `<br><small>${c.company}</small>` : ''}
                                </div>
                            `).join('') || '<p>Aucun client</p>'}
                        </div>
                    `).join('');
                }
            } catch (error) {
                view.innerHTML = '❌ Erreur de chargement';
            }
        }

        // Billing
        async function loadBilling() {
            const view = document.getElementById('billing-view');
            view.innerHTML = '⏳ Chargement...';
            
            try {
                const res = await fetch(API + '/billing/invoices');
                const data = await res.json();
                
                if (data.status === 'success' && data.data.length > 0) {
                    view.innerHTML = `
                        <table>
                            <tr><th>Référence</th><th>Client</th><th>Montant</th><th>Statut</th></tr>
                            ${data.data.map(inv => `
                                <tr>
                                    <td>${inv.reference}</td>
                                    <td>${inv.first_name} ${inv.last_name}</td>
                                    <td>${inv.amount} FCFA</td>
                                    <td><span class="badge badge-${inv.status === 'paid' ? 'success' : 'warning'}">${inv.status}</span></td>
                                </tr>
                            `).join('')}
                        </table>
                    `;
                } else {
                    view.innerHTML = '<p>Aucune facture</p>';
                }
            } catch (error) {
                view.innerHTML = '❌ Erreur';
            }
        }

        // Analytics
        async function loadAnalytics() {
            const view = document.getElementById('analytics-view');
            view.innerHTML = '⏳ Chargement...';
            
            try {
                const res = await fetch(API + '/analytics/stats');
                const data = await res.json();
                
                if (data.status === 'success') {
                    view.innerHTML = `
                        <div class="stats-grid">
                            <div class="stat-card"><div class="value">${data.data.total_posts}</div><div class="label">Total Posts</div></div>
                            <div class="stat-card"><div class="value">${data.data.total_clients}</div><div class="label">Total Clients</div></div>
                            <div class="stat-card"><div class="value">${data.data.total_messages}</div><div class="label">Messages</div></div>
                            <div class="stat-card"><div class="value">${data.data.conversion_rate}%</div><div class="label">Conversion</div></div>
                        </div>
                        <h4>Posts par catégorie</h4>
                        ${data.data.posts_by_category?.map(c => `<span class="badge badge-primary">${c.category}: ${c.count}</span> `).join('') || ''}
                    `;
                }
            } catch (error) {
                view.innerHTML = '❌ Erreur';
            }
        }

        function exportPDF() {
            window.open(API + '/analytics/export/pdf', '_blank');
        }

        // Templates
        async function loadTemplates() {
            const view = document.getElementById('templates-view');
            view.innerHTML = '⏳ Chargement...';
            
            try {
                const res = await fetch(API + '/templates');
                const data = await res.json();
                
                if (data.status === 'success' && data.data.length > 0) {
                    view.innerHTML = data.data.map(t => `
                        <div class="card">
                            <h4>${t.name} <span class="badge badge-primary">${t.sector || 'Général'}</span></h4>
                            <p>Utilisé ${t.usage_count} fois</p>
                        </div>
                    `).join('');
                } else {
                    view.innerHTML = '<p>Aucun template</p>';
                }
            } catch (error) {
                view.innerHTML = '❌ Erreur';
            }
        }

        // Automation
        async function loadAutomationStatus() {
            const view = document.getElementById('automation-view');
            
            try {
                const res = await fetch(API + '/automation/status');
                const data = await res.json();
                view.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                view.innerHTML = '🤖 Automatisation prête';
            }
        }

        // Charger le dashboard au démarrage
        loadDashboard();
    </script>
</body>
</html>
